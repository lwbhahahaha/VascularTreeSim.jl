# Coronary artery tree growth configuration
# For use with XCAT male50 heart phantom
# Parameters matched to v5 proven fine-resolution run

[organ]
name = "coronary"
nrb_path = "/home/molloi-lab/smb_mount/shared_drive/XCAT Phantom/xcat_adult_nrb_files/vmale50_heart.nrb"
phantom_path = "/home/molloi-lab/smb_mount/shared_drive/shu_nie/PVAT_Analysis/digital phantoms/vmale50_1600x1400x500_8bit_little_endian_act_1.raw"
phantom_dims = [1600, 1400, 500]
coordinate_scale = 0.1  # XCAT NRB uses mm, we work in cm

[surfaces]
outer = "dias_pericardium"
reference = "dias_aorta"
# Chamber cavities are subtracted via SDF flood-fill (no distance constraint).
# Tubular cavities (aorta, SVC, IVC) are auto-detected: their surface centroid
# falls outside outer_interior, so domain_builder applies a 2 cm max_distance
# constraint to prevent SDF over-subtraction far from the actual surface.
cavities = [
    "dias_lv_0",
    "dias_lv_1",
    "dias_lv_2",
    "dias_lv_3",
    "dias_lv_4",
    "dias_la",
    "dias_ra",
    "dias_rv",
    "dias_pul_art",
    "dias_aorta",
    "dias_sup_vc",
    "dias_inf_vc",
]

[[vessel_trees]]
name = "LAD"
surface_names = ["dias_lad1", "dias_lad2", "dias_lad3"]
color = "#1f77ff"
root_anchor_surface = "dias_aorta"

[[vessel_trees]]
name = "LCX"
surface_names = ["dias_lcx"]
color = "#e3342f"
root_anchor_surface = "dias_aorta"

[[vessel_trees]]
name = "RCA"
surface_names = ["dias_rca1", "dias_rca2"]
color = "#22aa44"
root_anchor_surface = "dias_aorta"

[domain]
voxel_spacing_cm = 0.02         # Fine resolution (v5 fine run)
outer_samples = [96, 72]
cavity_samples = [56, 40]
dilation_radius = 1
coarse_seed_cm = [14.085, 21.628, 26.966]   # From coarse (0.05cm) midwall computation

[growth]
mode = "continue_from_xcat"     # Continue from existing XCAT LAD/LCX/RCA
effective_supply_radius_cm = 0.00125   # 12.5 μm
capillary_diameter_cm = 0.0008         # 8 μm  (legacy: kept for backwards compat)
terminal_diameter_cm = 0.02            # 200 μm — Murray-strict terminal (leaf) diameter for growth phase
subdivision_terminal_diameter_cm = 0.0008  # 8 μm — recursive bifurcation of terminals to capillary level
max_new_branches_per_tree = 200000     # very large cap — real stop is Murray budget exhaustion / coverage
graph_neighbors = 16                   # v5 fine run
min_frontier_separation_cm = 0.015     # v5 fine run
max_path_nodes = 20
frontier_batch = 28                    # v5 fine run
murray_gamma = 3.0
max_segment_length_cm = 0.1
smooth_passes = 20
spline_density = 5
coverage_stride = 4                    # v5 fine run
graph_stride = 12                      # v5 fine run
graph_jitter_cm = 0.08                 # v5 fine run
turn_penalty = 0.5
target_p95_distance_cm = 0.005         # v5 fine run stopping criterion
target_max_distance_cm = 0.01          # v5 fine run stopping criterion
